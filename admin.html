<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Floristry | Admin</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .admin-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      .panel-card { border: 1px solid var(--line); border-radius: 14px; background: #fff; padding: 12px; }
      @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="section">
      <div class="container">
        <div class="section-head">
          <p class="kicker">Admin</p>
          <h2>Панель администратора</h2>
          <p><a href="./index.html">← На главную</a></p>
          <p id="adminState" class="form-message"></p>
        </div>

        <section>
          <h3>Статистика</h3>
          <div id="statsGrid" class="admin-grid"></div>
        </section>

        <section>
          <h3>Создать товар</h3>
          <form id="productForm" class="order-form" style="max-width: 720px;">
            <label>Название <input required name="name" type="text" /></label>
            <label>Категория <input required name="category" type="text" placeholder="roses / peonies / ..." /></label>
            <label>Цена <input required name="price" type="number" min="1" /></label>
            <label>Рейтинг <input name="rating" type="number" step="0.1" min="1" max="5" value="5" /></label>
            <label>Магазин <input required name="shop" type="text" /></label>
            <label>Badge <input name="badge" type="text" /></label>
            <label>Описание <textarea name="description" rows="3"></textarea></label>
            <button type="submit">Создать товар</button>
          </form>
        </section>

        <section>
          <h3>Пользователи</h3>
          <div id="usersGrid" class="admin-grid"></div>
        </section>

        <section>
          <h3>Заказы</h3>
          <div id="ordersGrid" class="admin-grid"></div>
        </section>

        <section>
          <h3>Товары</h3>
          <div id="productsGrid" class="admin-grid"></div>
        </section>
      </div>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
